<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Penerima Manfaat - Pemuda Anker-X Somakaton</title>
    <style>
        :root {
            --primary-color: #0b5227;
            --secondary-color: #d4af37;
            --dark-color: #1a1a1a;
            --light-color: #f4f6f4;
            --font-main: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--light-color);
            color: var(--dark-color);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .nav-back-box {
            margin-bottom: 25px;
        }

        .btn-back {
            display: inline-block;
            background: #ffffff;
            color: var(--primary-color);
            text-decoration: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            transition: 0.2s;
            font-size: 16px;
        }

        .btn-back:hover {
            background: var(--primary-color);
            color: white;
        }

        .card {
            background: #ffffff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 6px solid var(--primary-color);
        }

        .page-title {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            text-align: center;
        }

        .page-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .children-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .child-card {
            background: #fdfdfd;
            border: 1px solid #eef2ee;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .child-card:hover {
            border-color: var(--secondary-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-3px);
        }

        .child-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 2px solid #f0f0f0;
        }

        .child-name {
            font-weight: bold;
            font-size: 17px;
            color: var(--primary-color);
        }

        /* POP-UP MODAL FULL SCREEN */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            padding-top: 40px;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            overflow-y: auto;
        }

        .modal-content-wrapper {
            margin: 20px auto;
            width: 90%;
            max-width: 420px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 25px;
            border: 4px solid var(--secondary-color);
            animation: zoomIn 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        @keyframes zoomIn {
            from {transform: scale(0.7); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }

        .modal-img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
        }

        .modal-info { 
            padding: 20px 20px 0; 
            text-align: left; /* Diubah ke kiri agar detail biodata rapi */
        }
        
        .modal-info h2 { 
            color: var(--primary-color); 
            margin-bottom: 15px; 
            text-align: center;
            font-size: 24px;
        }
        
        /* Desain list biodata di dalam modal */
        .bio-info {
            background: #f9faf9;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #eef2ee;
            margin-bottom: 10px;
            font-size: 15px;
            color: #333;
        }
        
        .bio-info strong {
            color: var(--primary-color);
            display: inline-block;
            width: 100px;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 25px;
            color: white; font-size: 40px; font-weight: bold; cursor: pointer;
            transition: 0.2s;
            z-index: 1001;
        }
        
        .close-modal:hover {
            color: var(--secondary-color);
        }

        @media (min-width: 576px) {
            .children-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 992px) {
            .children-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-back-box">
        <a href="index.html" class="btn-back"> 🡨 Kembali ke Halaman Utama </a>
    </div>

    <div class="card">
        <div class="page-title">Daftar Anak Penerima Manfaat</div>
        <div class="page-subtitle">Penyaluran Santunan Pemuda Anker-X Somakaton Peduli (Klik foto untuk detail profil)</div>
        
        <div id="loading-anak" style="text-align:center; font-style:italic; color:#777; padding: 30px;">Menghubungkan data online Google Sheets...</div>
        
        <div class="children-grid" id="children-container"></div>
    </div>
</div>

<div id="childModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <div class="modal-content-wrapper">
        <img id="modalImg" class="modal-img">
        <div class="modal-info">
            <h2 id="modalName"></h2>
            
            <div class="bio-info"><strong>Keterangan :</strong> <span id="modalYear"></span></div>
            <div class="bio-info"><strong>Orang Tua :</strong> <span id="modalParent"></span></div>
            <div class="bio-info"><strong>Alamat :</strong> <span id="modalAddress"></span></div>
            
            <button onclick="closeModal()" style="margin-top:15px; width:100%; padding: 10px; cursor:pointer; background:var(--primary-color); color:white; border:none; border-radius:8px; font-weight:bold; font-size:16px; transition: 0.2s;">Tutup Profil</button>
        </div>
    </div>
</div>

<script>
    // URL LIVE TAB ANAK
    const ANAK_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQRv3nYgeT0mD1qCpYy9i_C6U1TMVq_Wbxudjxax34iMO9HUrk75fIwb_CMwe6_wguC15s_zd0JLB0n/pub?gid=729780931&single=true&output=csv";

    function openChildModal(imgSrc, name, year, parent, address) {
        document.getElementById("modalImg").src = imgSrc;
        document.getElementById("modalName").innerText = name;
        document.getElementById("modalYear").innerText = year;
        document.getElementById("modalParent").innerText = parent;
        document.getElementById("modalAddress").innerText = address;
        document.getElementById("childModal").style.display = "block";
    }

    function closeModal() {
        document.getElementById("childModal").style.display = "none";
    }

    async function fetchChildren() {
        try {
            const response = await fetch(ANAK_CSV_URL);
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1);
            let html = "";
            
            rows.forEach(row => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length >= 2 && col[0].trim() !== "") {
                    const name = col[0].replace(/"/g,'').trim();
                    const year = col[1].replace(/"/g,'').trim();
                    const img = col[2] ? col[2].replace(/"/g,'').trim() : "https://via.placeholder.com/150?text=Foto";
                    
                    // Membaca kolom ke-4 (Orang tua) dan ke-5 (Alamat)
                    const parent = col[3] ? col[3].replace(/"/g,'').trim() : "-";
                    const address = col[4] ? col[4].replace(/"/g,'').trim() : "-";

                    // Mengirimkan data tambahan ke fungsi click modal
                    html += `
                    <div class="child-card" onclick="openChildModal('${img}', '${name}', '${year}', '${parent}', '${address}')">
                        <img src="${img}" class="child-img" onerror="this.src='https://via.placeholder.com/150?text=Foto+Anak';">
                        <div class="child-name">${name}</div>
                    </div>`;
                }
            });
            
            if(html !== "") {
                document.getElementById("children-container").innerHTML = html;
                document.getElementById("loading-anak").style.display = "none";
            } else {
                document.getElementById("loading-anak").innerText = "Belum ada data anak terdaftar di Google Sheets.";
            }
        } catch (e) { 
            console.error(e); 
            document.getElementById("loading-anak").innerText = "Gagal sinkronisasi data anak secara online.";
        }
    }

    // Menutup modal saat klik area luar modal
    window.onclick = function(event) {
        if (event.target == document.getElementById("childModal")) closeModal();
    }
    
    // Menutup modal saat tombol Escape (Esc) ditekan
    window.onkeydown = function(event) {
        if (event.key === "Escape") closeModal();
    }
    
    window.onload = fetchChildren;
</script>
</body>
</html>
